<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Conectarte - Início</title>
    <link rel="stylesheet" href="CSS/index.css">
    <link rel="stylesheet" href="CSS/style.css">
</head>

<body>
    <div id="fundo-site"></div>
    <div id="cabecalho">
        <img src="Imagens/logo_conectarte.png" alt="Logo Conectarte" class="logo">
        <div class="texto-cabecalho">
            <h1>Conectarte</h1>
            <p>Viva a tecnologia. Sinta a arte.</p>
        </div>
    </div>

    <div id="conteudo-principal">
        <div class="texto-apresentacao">
            <h2>Encontre o talento ideal!</h2>
            <p>Publique suas vagas e projetos para milhares de artistas prontos para dar vida à sua ideia.</p>
        </div>

        <div id="sessao-login">
            <h3>Cadastro de Empresa / Contratante</h3>
            <form action="inicio.html">
                <label>Nome do Responsável / Nome Fantasia:</label>
                <input type="text" placeholder="Como quer ser chamado na vitrine?" required>

                <label>CNPJ / CPF (Uso interno):</label>
                <input type="text" pattern="\d{11}|\d{14}" placeholder="Apenas números para segurança e NF" required>

                <label>E-mail Corporativo:</label>
                <input type="email" placeholder="contato@empresa.com" required>

                <label for="whatsapp">WhatsApp / Celular:</label>
                <div class="campo-icone">
                    <input type="tel" id="whatsapp" name="whatsapp" placeholder="(00) 90000-0000"
                        pattern="\(\d{2}\)\s\d{5}-\d{4}" title="Formato esperado: (00) 90000-0000" required>
                </div>

                <button type="submit" class="botao-conectar">Conectar-te</button>
            </form>
        </div>
        <div id="rodape">
            <p>Desenvolvido por Enzo</p>
        </div>


</body>

</html>
